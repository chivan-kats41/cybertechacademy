{% extends 'base.html' %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<section class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center fade-in">
    <div class="relative mb-6 inline-block">
      <p class="font-display text-9xl font-black text-transparent" style="
        -webkit-text-stroke: 2px rgba(255,80,80,0.4);
        text-shadow: 0 0 60px rgba(255,80,80,0.15);">500</p>
    </div>
    <h1 class="font-display text-2xl font-bold text-white mb-3">Internal Server Error</h1>
    <p class="text-cyber-muted max-w-sm mx-auto mb-8">
      Something went wrong on our end. Our team has been notified.
      Please try again in a moment.
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/" class="btn-primary px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="mailto:chivankats@gmail.com"
        class="btn-outline px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
        <i class="fas fa-envelope"></i> Report Issue
      </a>
    </div>
  </div>
</section>
{% endblock %}
