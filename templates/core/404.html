{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<section class="min-h-screen flex items-center justify-center px-4">
  <div class="text-center fade-in">
    <div class="relative mb-6 inline-block">
      <p class="font-display text-9xl font-black text-transparent" style="
        -webkit-text-stroke: 2px rgba(0,245,255,0.4);
        text-shadow: 0 0 60px rgba(0,245,255,0.2);">404</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <i class="fas fa-ghost text-cyan-400/20 text-6xl"></i>
      </div>
    </div>
    <h1 class="font-display text-2xl font-bold text-white mb-3">Page Not Found</h1>
    <p class="text-cyber-muted max-w-sm mx-auto mb-8">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/" class="btn-primary px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
        <i class="fas fa-home"></i> Go Home
      </a>
      <a href="/courses/" class="btn-outline px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
        <i class="fas fa-book-open"></i> Browse Courses
      </a>
    </div>
  </div>
</section>
{% endblock %}
